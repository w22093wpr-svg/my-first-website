<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員即時監察端 (Admin Screen)</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // 1. 設定你的 Firebase 配置（使用你的專屬資料庫網址）
        const firebaseConfig = {
            databaseURL: "https://chloe-2c627-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // 2. 定義管理員監察參數 adminScreen
        let adminScreen = "正在連線中...";

        // 3. 連線到資料庫的 'current_status/activeFeature' 路徑
        const statusRef = ref(database, 'current_status/activeFeature');

        // 4. 當小朋友端點擊按鈕、資料庫一改變，這裡會立刻被觸發
        onValue(statusRef, (snapshot) => {
            const data = snapshot.val();
            
            // 將即時數據同步更新到管理員的參數與畫面上
            adminScreen = data || "未知狀態";
            
            // 更新網頁畫面顯示
            document.getElementById("admin-monitor").innerText = adminScreen;
            console.log("【管理員監控】目前小朋友正在使用：", adminScreen);
        }, (error) => {
            console.error("讀取資料失敗:", error);
            document.getElementById("admin-monitor").innerText = "讀取失敗，請檢查權限設定。";
        });
    </script>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; background-color: #f4f6f9;">

    <div style="max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="color: #333; margin-top: 0; border-bottom: 2px solid #334155; padding-bottom: 10px;">
            管理員即時監察端 (Admin)
        </h2>
        
        <p style="font-size: 1.1em; color: #475569;">
            目前連線資料庫：<br>
            <small style="color: #0284c7;">chloe-2c627-default-rtdb</small>
        </p>

        <div style="margin-top: 30px; padding: 20px; background-color: #f8fafc; border-left: 5px solid #ef4444; border-radius: 4px;">
            <span style="font-weight: bold; color: #64748b; display: block; margin-bottom: 5px;">
                小朋友目前正在使用：
            </span>
            <span id="admin-monitor" style="font-size: 2em; font-weight: bold; color: #ef4444;">
                載入中...
            </span>
        </div>
    </div>

</body>
</html>
