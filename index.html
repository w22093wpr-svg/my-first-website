<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyControl</title>
    <!-- 強制全螢幕憑證 -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZhbWlseUNvbnRyb2wiLAogICJzaG9ydF9uYW1lIjogIkZhbWlseUNvbnRyb2wiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzAwMDAwMCIsCiAgInRoZW1lX2NvbG9yIjogIiMwMDAwMDAiCn0=">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>.no-scroll { overflow: hidden; touch-action: none; }</style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- 小孩端 -->
    <div id="child-view" class="hidden min-h-screen flex flex-col items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl text-center max-w-sm w-full">
            <div class="animate-pulse text-green-500 text-5xl mb-4">💚</div>
            <h1 class="text-xl font-bold text-gray-800 mb-2">系統守護中</h1>
            <p class="text-sm text-gray-500">連線已啟動</p>
        </div>
    </div>

    <!-- 鎖定層 -->
    <div id="lock-screen" class="hidden fixed inset-0 bg-black z-50 flex flex-col items-center justify-center text-white p-6 no-scroll">
        <div class="text-center space-y-4">
            <span id="lock-icon" class="text-6xl mb-2 block animate-bounce">⚠️</span>
            <h1 id="lock-title" class="text-3xl font-extrabold tracking-wider text-red-500"></h1>
            <p id="lock-msg" class="text-lg text-gray-300 px-4 animate-pulse"></p>
        </div>
    </div>

    <!-- 家長端控制台 (保持你原本的所有功能) -->
    <div id="parent-view" class="hidden min-h-screen bg-slate-900 text-white p-6">
        <div class="max-w-md mx-auto space-y-6">
            <h1 class="text-2xl font-bold text-sky-400">⚡ 家長直連控制台</h1>
            <button onclick="directUnlock()" class="w-full bg-emerald-600 p-4 rounded-xl font-bold">🔓 解除鎖定</button>
            <div class="bg-slate-800 p-5 rounded-2xl space-y-3">
                <input type="text" id="custom-title" placeholder="標題" class="w-full bg-slate-700 p-3 rounded-lg text-white">
                <input type="text" id="custom-msg" placeholder="內容" class="w-full bg-slate-700 p-3 rounded-lg text-white">
                <button onclick="sendCustomText()" class="w-full bg-amber-500 p-3 rounded-lg text-black font-bold">🔒 發送並鎖定</button>
            </div>
            <button onclick="directLock('', '')" class="w-full bg-purple-600 p-3 rounded-lg font-bold">⚫ 完全純黑屏</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const TARGET_TOKEN = "TKeJ2mKK3Uqaw5K6suxeJvCCUyZhR5rtCJntNfnz";
        const db = firebase.initializeApp({databaseURL: "https://crested-guru-452314-r3-default-rtdb.asia-southeast1.firebasedatabase.app"}).database();

        const role = new URLSearchParams(window.location.search).get('role');
        if (role === 'parent') {
            document.getElementById('parent-view').classList.remove('hidden');
        } else {
            document.getElementById('child-view').classList.remove('hidden');
            initChildListener();
        }

        function initChildListener() {
            db.ref('deviceState').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data || data.targetToken !== TARGET_TOKEN) return;

                const lockScreen = document.getElementById('lock-screen');
                if (data.isLocked) {
                    lockScreen.classList.remove('hidden');
                    document.body.classList.add('no-scroll');
                    document.getElementById('lock-title').innerText = data.title;
                    document.getElementById('lock-msg').innerText = data.message;
                    
                    // 【通知機制】
                    if ("vibrate" in navigator) navigator.vibrate([1000, 500, 1000]);
                    if ("Notification" in window && Notification.permission === "granted") {
                        new Notification(data.title || "系統通知", { body: data.message });
                    }
                    // 【App Inventor 暗號】
                    if (window.AppInventor) window.AppInventor.setWebViewString("LOCK");
                } else {
                    lockScreen.classList.add('hidden');
                    document.body.classList.remove('no-scroll');
                }
            });
        }

        function sendCustomText() { directLock(document.getElementById('custom-title').value, document.getElementById('custom-msg').value); }
        function directLock(t, m) { db.ref('deviceState').set({isLocked: true, targetToken: TARGET_TOKEN, title: t, message: m, updatedAt: Date.now()}); }
        function directUnlock() { db.ref('deviceState').set({isLocked: false, targetToken: TARGET_TOKEN}); }
    </script>
</body>
</html>
