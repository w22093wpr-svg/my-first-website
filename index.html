<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyControl</title>

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkZhbWlseUNvbnRyb2wiLAogICJzaG9ydF9uYW1lIjogIkZhbWlseUNvbnRyb2wiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzAwMDAwMCIsCiAgInRoZW1lX2NvbG9yIjogIiMwMDAwMDAiCn0=">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        .no-scroll { overflow: hidden; touch-action: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="child-view" class="hidden min-h-screen flex flex-col items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl text-center max-w-sm w-full">
            <div class="animate-pulse text-green-500 text-5xl mb-4">💚</div>
            <h1 class="text-xl font-bold text-gray-800 mb-2">系統守護中</h1>
            <p class="text-sm text-gray-500">已連線至新加坡伺服器...</p>
            <button onclick="requestNotifyPermission()" class="mt-4 text-xs bg-gray-200 text-gray-600 px-3 py-1.5 rounded-lg">
                🔄 點擊測試/重新授權通知
            </button>
        </div>
    </div>

    <div id="lock-screen" class="hidden fixed inset-0 bg-black z-50 flex flex-col items-center justify-center text-white p-6 no-scroll">
        <div class="text-center space-y-4">
            <span id="lock-icon" class="text-6xl mb-2 block animate-bounce">⚠️</span>
            <h1 id="lock-title" class="text-3xl font-extrabold tracking-wider text-red-500"></h1>
            <p id="lock-msg" class="text-lg text-gray-300 px-4 animate-pulse"></p>
        </div>
    </div>

    <div id="parent-view" class="hidden min-h-screen bg-slate-900 text-white p-6">
        <div class="max-w-md mx-auto space-y-6">
            <header class="border-b border-slate-700 pb-4">
                <h1 class="text-2xl font-bold text-sky-400">⚡ 家長直連控制台</h1>
                <p class="text-xs text-slate-400 mt-1">新加坡節點 · 即時通知修正版</p>
            </header>

            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                <button onclick="directUnlock()" class="w-full bg-emerald-600 hover:bg-emerald-700 active:scale-95 transition text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2">
                    <span>🔓 解除黑屏鎖定</span>
                </button>
            </div>

            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-3">
                <h2 class="text-sm font-semibold text-amber-400 uppercase tracking-wider">✍️ 方案 A：自訂文字鎖定</h2>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">黑屏大標題</label>
                    <input type="text" id="custom-title" placeholder="例如：唔好再打機！" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">黑屏小提示內容</label>
                    <input type="text" id="custom-msg" placeholder="例如：乖乖地去做工作紙！" class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none">
                </div>
                <button onclick="sendCustomText()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-extrabold py-3 rounded-xl transition text-sm">
                    🔒 發送自訂文字並鎖定
                </button>
            </div>

            <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-2">
                <h2 class="text-sm font-semibold text-purple-400 uppercase tracking-wider">🕳️ 方案 B：純黑屏鎖定</h2>
                <button onclick="directLock('', '')" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                    <span>⚫ 執行完全純黑屏</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const TARGET_TOKEN = "TKeJ2mKK3Uqaw5K6suxeJvCCUyZhR5rtCJntNfnz";
        const firebaseConfig = { databaseURL: "https://crested-guru-452314-r3-default-rtdb.asia-southeast1.firebasedatabase.app" };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');

        if (role === 'parent') {
            document.getElementById('parent-view').classList.remove('hidden');
        } else {
            document.getElementById('child-view').classList.remove('hidden');
            // 小孩端一打開，立刻要求通知權限
            requestNotifyPermission();
            initChildListener();
        }

        // 請求瀏覽器通知權限
        function requestNotifyPermission() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    console.log("通知權限狀態：", permission);
                });
            }
        }

        function initChildListener() {
            let lastState = false; // 用來紀錄上一次有沒有鎖定，避免重複彈通知

            db.ref('deviceState').on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                const lockScreen = document.getElementById('lock-screen');
                const lockIcon = document.getElementById('lock-icon');
                const lockTitle = document.getElementById('lock-title');
                const lockMsg = document.getElementById('lock-msg');

                if (data.isLocked === true && data.targetToken === TARGET_TOKEN) {
                    lockScreen.classList.remove('hidden');
                    document.body.classList.add('no-scroll');
                    
                    if (data.title === "" && data.message === "") {
                        lockIcon.style.display = "none";
                        lockTitle.innerText = "";
                        lockMsg.innerText = "";
                    } else {
                        lockIcon.style.display = "block";
                        lockTitle.innerText = data.title;
                        lockMsg.innerText = data.message;
                    }

                    // 【核心修正】如果原本沒鎖，突然被鎖定了，立刻發送網頁實體通知、並讓手機震動
                    if (!lastState) {
                        triggerLocalNotification(data.title || "系統警告", data.message || "設備已被鎖定！");
                        lastState = true;
                    }
                } else {
                    lockScreen.classList.add('hidden');
                    document.body.classList.remove('no-scroll');
                    lastState = false;
                }
            });
        }

        // 觸發實體通知與震動的魔法
        function triggerLocalNotification(title, body) {
            // 讓手機強制震動 500 毫秒
            if ("vibrate" in navigator) {
                navigator.vibrate([500, 200, 500]);
            }

            // 發出網頁內置通知
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, {
                    body: body,
                    icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png", // 鎖頭圖示
                    requireInteraction: true // 通知會一直卡在畫面上，直到被點擊
                });
            }
        }

        function sendCustomText() {
            const titleInput = document.getElementById('custom-title').value.trim();
            const msgInput = document.getElementById('custom-msg').value.trim();
            if (!titleInput) { alert("請至少輸入一個大標題！"); return; }
            directLock(titleInput, msgInput);
        }

        function directLock(title, message) {
            db.ref('deviceState').set({
                isLocked: true,
                targetToken: TARGET_TOKEN,
                title: title,
                message: message,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function directUnlock() {
            db.ref('deviceState').set({
                isLocked: false,
                targetToken: TARGET_TOKEN,
                title: "",
                message: "",
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            });
        }
    </script>
</body>
</html>
