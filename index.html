<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的 App 功能監察系統</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // 你的專屬資料庫
        const firebaseConfig = {
            databaseURL: "https://chloe-2c627-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // ==========================================
        // 1. 小朋友端：點擊切換任何功能（無限參數，傳什麼就寫入什麼）
        // ==========================================
        window.switchFunction = function(anyFeature) {
            // anyFeature 就是你說的無限參數，帶入什麼功能名稱，資料庫就同步什麼
            set(ref(database, 'current_status/activeFeature'), anyFeature)
            .then(() => console.log("App 成功同步功能:", anyFeature))
            .catch((error) => console.error("同步失敗:", error));
        }

        // ==========================================
        // 2. 管理員判斷：檢查網址後面有沒有加 admin 英文
        // ==========================================
        // 獲取目前網址的參數 (例如：index.html?role=admin)
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role'); // 撈取 role 的數值

        // 如果網址後面有加管理員英文 admin，就啟動監察端參數
        if (role === 'admin') {
            let adminScreen = ''; // 管理員監察用的變數
            
            // 顯示管理員專屬後台畫面
            document.getElementById("admin-view").style.display = "block";

            // 即時讀取與監察
            const statusRef = ref(database, 'current_status/activeFeature');
            onValue(statusRef, (snapshot) => {
                adminScreen = snapshot.val() || "無";
                document.getElementById("admin-monitor").innerText = adminScreen;
                console.log("【管理員即時監察】:", adminScreen);
            });
        }
    </script>
</head>
<body style="font-family: sans-serif; padding: 20px;">

    <div style="background: #f0fdf4; padding: 20px; border-radius: 8px;">
        <h3>【App 內嵌功能（小朋友點擊）】</h3>
        <button onclick="switchFunction('crazygame')">瘋狂遊戲</button>
        <button onclick="switchFunction('youtube')">YouTube 影片</button>
        <button onclick="switchFunction('music')">音樂功能</button>
        <button onclick="switchFunction('anyNewFeature')">未來新增的無限功能參數</button>
    </div>

    <div id="admin-view" style="display: none; background: #fef2f2; padding: 20px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #ef4444;">
        <h3>【管理員監察後台 (Admin Mode)】</h3>
        <p style="font-size: 1.2em;">
            即時監控畫面 ➔ 目前正在使用：
            <strong id="admin-monitor" style="color: #ef4444; font-size: 1.5em;">連線中...</strong>
        </p>
    </div>

</body>
</html>
