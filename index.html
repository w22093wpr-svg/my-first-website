<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 AI 語音助理</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 20px; }
        button {
            background-color: #4facfe;
            background-image: linear-gradient(130deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,242,254,0.4);
            transition: transform 0.2s;
            width: 100%;
        }
        button:active { transform: scale(0.95); }
        .status { margin-top: 20px; color: #666; font-size: 16px; min-height: 24px; }
        .response { margin-top: 15px; font-weight: bold; color: #222; font-size: 18px; word-break: break-all; }
        
        /* 隱藏的計時器挑戰頁面 */
        #challenge-page {
            display: none;
            margin-top: 20px;
            background: #ff9a9e;
            background-image: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
            padding: 20px;
            border-radius: 15px;
            color: white;
            animation: fadeIn 0.5s ease-in-out forwards;
        }
        #timer-display { font-size: 48px; font-weight: bold; margin: 10px 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>AI 語音助理</h1>
    <button id="speak-btn">🎤 按下開始對話</button>
    <div class="status" id="status-text">準備就緒，點擊按鈕說話...</div>
    <div class="response" id="response-text"></div>

    <div id="challenge-page">
        <h3>🏆 挑戰頁面已開啟 🏆</h3>
        <div id="timer-display">10</div>
        <p>倒數計時中，加油！</p>
    </div>
</div>

<script>
    const speakBtn = document.getElementById('speak-btn');
    const statusText = document.getElementById('status-text');
    const responseText = document.getElementById('response-text');
    const challengePage = document.getElementById('challenge-page');
    const timerDisplay = document.getElementById('timer-display');

    let countdownTimer;

    // 檢查瀏覽器是否支援語音辨識與語音合成
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        statusText.innerText = "抱歉，您的瀏覽器不支援語音辨識，請使用 Chrome 或 Safari。";
        speakBtn.style.display = 'none';
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'zh-TW'; // 設定辨識語言
    recognition.interimResults = false;

    // 讓手機/電腦說話的函數
    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        window.speechSynthesis.speak(utterance);
    }

    // 啟動計時器挑戰的函數
    function startTimerChallenge() {
        challengePage.style.display = 'block';
        let timeLeft = 10; // 設定倒數 10 秒挑戰
        timerDisplay.innerText = timeLeft;

        clearInterval(countdownTimer);
        countdownTimer = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdownTimer);
                speak("挑戰時間到！");
                alert("時間到！挑戰結束！");
            }
        }, 1000);
    }

    // 點擊按鈕觸發語音聽寫
    speakBtn.addEventListener('click', () => {
        // 先隱藏上一次的計時器
        challengePage.style.display = 'none';
        clearInterval(countdownTimer);
        responseText.innerText = "";
        
        statusText.innerText = "正在聆聽中...請說話...";
        recognition.start();
    });

    // 當語音辨識成功拿到文字後
    recognition.onresult = async (event) => {
        const userQuery = event.results[0][0].transcript;
        statusText.innerText = `你說：「${userQuery}」`;
        responseText.innerText = "AI 思考中...";

        // 給 Puter.js AI 的大腦說明書 (System Prompt)
        const systemPrompt = "你是一個智慧語音助理。當使用者想要『開啟計時器』、『倒數』或相關挑戰時，你必須而且只能回答 `[TIMER]` 這七個字，絕對不能有其他字。如果使用者問其他生活常識或百科問題（例如最長的河流），請正常用繁體中文回答。";

        try {
            // 呼叫 Puter.js 免費的 AI 聊天功能
            const response = await puter.ai.chat(
                `${systemPrompt}\n\n使用者說：${userQuery}`
            );

            const aiAnswer = response.toString().trim();

            // 判斷 AI 回傳的是不是秘密暗號
            if (aiAnswer.includes('[TIMER]')) {
                responseText.innerText = "收到指令！";
                statusText.innerText = "已成功觸發計時器！";
                speak("挑戰頁面已開啟計時器！");
                startTimerChallenge();
            } else {
                // 如果是百科問題，直接秀出答案並讀出來
                responseText.innerText = aiAnswer;
                speak(aiAnswer);
            }

        } catch (error) {
            console.error(error);
            responseText.innerText = "糟糕，AI 大腦連線失敗。";
        }
    };

    // 辨識出錯時處理
    recognition.onerror = () => {
        statusText.innerText = "沒聽清楚，請再按一次按鈕試試看。";
        responseText.innerText = "";
    };
</script>

</body>
</html>
