<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase 私人專案監控端</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .mode { display: none; }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { background-color: #0056b3; }
        .badge {
            display: inline-block;
            background-color: #e2e3e5;
            color: #383d41;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 20px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="childContainer" class="mode">
            <h2>🎒 小朋友模式運作中</h2>
            <p>點擊下方按鈕測試參數傳送：</p>
            <button class="btn" onclick="triggerSwitch('game_start')">模擬：開始遊戲</button>
            <button class="btn" onclick="triggerSwitch('reading_book')">模擬：閱讀繪本</button>
        </div>

        <div id="adminContainer" class="mode">
            <h2>👁️ 私人管理員監察端</h2>
            <p>即時同步的動態參數：</p>
            <div id="monitorDisplay" class="badge">正在連線資料庫...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 前端安全的配置：只需提供資料庫網址，不包含私鑰
        const firebaseConfig = {
            databaseURL: "https://chloe-2c627-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // 初始化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const targetRef = ref(db, 'current_status/activeFeature');

        // 2. 核心同步函數：讓全世界都可以呼叫的 window 職責
        window.switchFunction = function(currentFunction) {
            if (!currentFunction) return;
            set(targetRef, currentFunction)
                .then(() => console.log(`[成功推送到資料庫]: ${currentFunction}`))
                .catch(err => console.error("寫入失敗，請檢查資料庫規則設定:", err));
        };

        // 按鈕輔助函數
        window.triggerSwitch = function(name) {
            window.switchFunction(name);
        };

        // 3. 網址角色路由分流邏輯
        function checkRoleRoute() {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            
            const childEl = document.getElementById('childContainer');
            const adminEl = document.getElementById('adminContainer');

            if (role === 'admin') {
                // 進入管理員監察模式
                adminEl.style.display = 'block';
                childEl.remove(); // 安全機制：直接把小朋友的 DOM 元素刪除

                // 啟動秒速即時監聽
                onValue(targetRef, (snapshot) => {
                    const value = snapshot.val();
                    document.getElementById('monitorDisplay').innerText = value ? value : '尚未獲取到資料';
                });
            } else {
                // 進入小朋友預設模式
                childEl.style.display = 'block';
                adminEl.remove(); // 安全機制：直接把管理員的 DOM 元素刪除
                
                // 模擬開啟網頁時自動同步初始值
                window.switchFunction('app_init');
            }
        }

        // 執行初始化路由
        checkRoleRoute();
    </script>
</body>
</html>
