<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase 即時同步系統</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        /* 預設隱藏所有模式，由 JS 決定顯示哪一個 */
        .mode-section {
            display: none;
        }
        .btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #357abd; }
        .btn:active { transform: scale(0.98); }
        .status-badge {
            display: inline-block;
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
        }
        h1 { color: #2c3e50; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="childMode" class="mode-section">
            <h1>🎒 小朋友互動空間</h1>
            <p>目前正在運行此功能，系統會自動同步狀態。</p>
            <button class="btn" onclick="simulateSwitch('drawingGame')">開啟畫畫遊戲</button>
            <button class="btn" onclick="simulateSwitch('mathQuiz')">開啟數學挑戰</button>
            <button class="btn" onclick="simulateSwitch('englishStory')">開啟英文故事</button>
        </div>

        <div id="adminMode" class="mode-section">
            <h1>👁️ 管理員即時監察端</h1>
            <p>當前小朋友正在使用的功能參數：</p>
            <div id="currentActiveFeature" class="status-badge">等待資料載入...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 1. Firebase 配置 (已預設為您指定的 databaseURL)
        const firebaseConfig = {
            databaseURL: "https://chloe-2c627-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        // 初始化 Firebase 与 Realtime Database
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const statusRef = ref(db, 'current_status/activeFeature');

        ---

        // 2. 核心功能：無限擴充的自動同步參數函數
        window.switchFunction = function(currentFunction) {
            if (!currentFunction) return;
            
            // 立刻將最新的狀態數值寫入 Firebase
            set(statusRef, currentFunction)
                .then(() => {
                    console.log(`[Firebase] 成功同步參數: ${currentFunction}`);
                })
                .catch((error) => {
                    console.error("[Firebase] 同步失敗:", error);
                });
        };

        // 供小朋友畫面按鈕測試用的輔助函數
        window.simulateSwitch = function(featureName) {
            window.switchFunction(featureName);
        };

        ---

        // 3. 角色分流邏輯與畫面控制
        function initApp() {
            // 解析網址參數
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');

            const childDOM = document.getElementById('childMode');
            const adminDOM = document.getElementById('adminMode');

            if (role === 'admin') {
                // 【管理員監察模式】
                adminDOM.style.display = 'block';
                childDOM.remove(); // 徹底移除小朋友畫面，防止透過 CSS 繞過

                // 啟動 Firebase 隔空秒速監聽
                onValue(statusRef, (snapshot) => {
                    const data = snapshot.val();
                    const displayDOM = document.getElementById('currentActiveFeature');
                    if (data) {
                        displayDOM.innerText = data;
                    } else {
                        displayDOM.innerText = '尚無資料';
                    }
                });
            } else {
                // 【小朋友模式】 (預設模式，網址無參數或參數錯誤時)
                childDOM.style.display = 'block';
                adminDOM.remove(); // 徹底移除管理員畫面

                // 模擬 App 初始化時自動呼叫一次，載入預設功能
                window.switchFunction('defaultHome');
            }
        }

        // 執行初始化
        initApp();
    </script>
</body>
</html>
