<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動態監控系統</title>
  <style>
    :root {
      --primary-color: #4a90e2;
      --bg-color: #f5f7fa;
      --card-bg: #ffffff;
      --text-color: #333333;
    }
    
    /* 管理員端紅色系面板 */
    body.role-admin {
      --primary-color: #e53935;
      --bg-color: #ffebee;
      --card-bg: #ffffff;
      --text-color: #212121;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
      transition: background-color 0.3s ease;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* 角色視圖控制 */
    .view-section { display: none; }
    body.role-child #child-view { display: block; }
    body.role-admin #admin-view { display: block; }

    /* UI 組件樣式 */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    h1, h2 { margin-top: 0; color: var(--primary-color); }
    
    .timer-display {
      font-size: 3rem;
      font-weight: bold;
      font-family: monospace;
      text-align: center;
      margin: 20px 0;
    }

    .param-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .param-card {
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      padding: 15px;
      text-align: center;
    }
    body.role-admin .param-card {
      border-color: #ffcdd2;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      background: #e0e0e0;
    }
    .status-badge.active {
      background-color: #2e7d32;
      color: white;
    }

    /* 小朋友測試用按鈕區（模擬系統觸發參數切換） */
    .test-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      margin-right: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="child-view" class="view-section">
      <div class="card">
        <h1>學習小助手</h1>
        <p>系統正在安穩運行中，請專注於你的學習任務。</p>
        <div class="timer-display" id="child-timer">00:00:00</div>
      </div>
      
      <div class="card" style="border: 1px dashed #ccc;">
        <h3>[開發者測試] 模擬內部功能切換</h3>
        <button class="test-btn" onclick="switchFunction('MathGame')">進入 數學遊戲</button>
        <button class="test-btn" onclick="switchFunction('EnglishReading')">進入 英文閱讀</button>
        <button class="test-btn" onclick="switchFunction('DrawingBoard')">進入 自由畫板</button>
      </div>
    </div>

    <div id="admin-view" class="view-section">
      <div class="card">
        <h1>管理員即時監察面板</h1>
        <hr>
        <h3>今日累計使用時間</h3>
        <div class="timer-display" id="admin-timer">00:00:00</div>
      </div>

      <div class="card">
        <h3>動態自訂參數與狀態監測</h3>
        <div class="param-grid" id="admin-params-container">
          <p style="color: #666;">正在加載雲端動態參數...</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 1. 預設配置初始化
    const firebaseConfig = {
      databaseURL: "https://chloe-2c627-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 取得今天的日期字串 (YYYY-MM-DD)
    const getTodayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    // 時間格式化工具 (秒 -> HH:MM:SS)
    const formatTime = (totalSeconds) => {
      const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const secs = String(totalSeconds % 60).padStart(2, '0');
      return `${hrs}:${mins}:${secs}`;
    };

    // 2. 角色分流判定
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role') === 'admin' ? 'admin' : 'child';
    document.body.classList.add(`role-${role}`);

    // ==================== 小朋友端邏輯 ====================
    if (role === 'child') {
      let secondsUsed = 0;
      const todayPath = `monitor_system/${getTodayStr()}`;
      const childTimerEl = document.getElementById('child-timer');

      // 斷點續記：先讀取今日已累積秒數
      get(ref(db, todayPath)).then((snapshot) => {
        if (snapshot.exists() && snapshot.val().secondsUsed) {
          secondsUsed = snapshot.val().secondsUsed;
        }
        childTimerEl.textContent = formatTime(secondsUsed);

        // 開始每秒累加並即時同步至 Firebase
        setInterval(() => {
          secondsUsed++;
          childTimerEl.textContent = formatTime(secondsUsed);
          update(ref(db, todayPath), { secondsUsed: secondsUsed });
        }, 1000);
      }).catch((error) => console.error("讀取斷點時間失敗:", error));

      // 全域核心函數：動態參數寫入
      window.switchFunction = function(currentFunction) {
        if (!currentFunction) return;
        // 將舊有的 active 狀態清除或直接更新目標參數為 active
        // 這裡實作直接寫入目前激發的參數狀態
        const paramRef = ref(db, `custom_params/${currentFunction}`);
        set(paramRef, {
          paramName: currentFunction,
          lastActive: new Date().toISOString(),
          status: "active"
        });
      };
    }

    // ==================== 管理員端邏輯 ====================
    if (role === 'admin') {
      const todayPath = `monitor_system/${getTodayStr()}`;
      const adminTimerEl = document.getElementById('admin-timer');
      const paramsContainer = document.getElementById('admin-params-container');

      // 監聽今日計時器秒數
      onValue(ref(db, todayPath), (snapshot) => {
        if (snapshot.exists() && snapshot.val().secondsUsed) {
          adminTimerEl.textContent = formatTime(snapshot.val().secondsUsed);
        } else {
          adminTimerEl.textContent = "00:00:00";
        }
      });

      // 監聽動態參數路徑，自動利用 Object.keys() 撈出並渲染
      onValue(ref(db, 'custom_params'), (snapshot) => {
        paramsContainer.innerHTML = ''; // 清空舊渲染
        
        if (!snapshot.exists()) {
          paramsContainer.innerHTML = `<p style="color: #666;">目前雲端尚無動態參數</p>`;
          return;
        }

        const data = snapshot.val();
        const keys = Object.keys(data);

        keys.forEach(key => {
          const paramInfo = data[key];
          const card = document.createElement('div');
          card.className = 'param-card';
          card.innerHTML = `
            <h4>${key}</h4>
            <span class="status-badge active">${paramInfo.status || 'N/A'}</span>
          `;
          paramsContainer.appendChild(card);
        });
      });
    }
  </script>
</body>
</html>
