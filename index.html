<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>App 內部功能自動監察系統</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // 使用你的專屬資料庫網址
        const firebaseConfig = {
            databaseURL: "https://chloe-2c627-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // =======================================================
        // 核心 JS 函數：由你的 App 內部自動觸發，小朋友無法自己選
        // =======================================================
        window.switchFunction = function(currentFunction) {
            // currentFunction 是無限參數，App 自動帶入什麼，資料庫就記錄什麼
            set(ref(database, 'current_status/activeFeature'), currentFunction)
            .then(() => console.log("【App 自動同步成功】當前功能參數：", currentFunction))
            .catch((error) => console.error("同步失敗:", error));
        }

        // =======================================================
        // 角色判斷邏輯：檢查網址後面有沒有加管理員的英文 ?admin=true
        // =======================================================
        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('admin'); // 撈取網址後方的 admin 參數

        if (isAdmin === 'true') {
            // 【管理員模式】：隱藏原本的 App 內容，變身成即時監察面板
            window.addEventListener('DOMContentLoaded', () => {
                document.getElementById("app-content").style.display = "none";
                document.getElementById("admin-monitor-screen").style.display = "block";
            });

            // 即時讀取資料庫的數值
            const statusRef = ref(database, 'current_status/activeFeature');
            onValue(statusRef, (snapshot) => {
                const currentActive = snapshot.val() || "無資料";
                document.getElementById("admin-display").innerText = currentActive;
            });
        } else {
            // 【小朋友模式】：網頁載入時，由 App 內部自動呼叫函數發送參數
            // 這裡可以改成你 App 內部切換頁面的邏輯
            window.addEventListener('DOMContentLoaded', () => {
                // 舉例：App 此時載入了音樂功能，就自動觸發，帶入無限參數
                switchFunction('music'); 
            });
        }
    </script>
</head>
<body style="font-family: sans-serif; padding: 20px; margin: 0;">

    <div id="app-content" style="display: block; text-align: center; padding-top: 50px;">
        <h2>App 內嵌功能正在運行中...</h2>
        <p style="color: #666;">（小朋友正在使用此功能，一切狀態自動同步，無手動選項）</p>
    </div>

    <div id="admin-monitor-screen" style="display: none; background: #fef2f2; padding: 30px; border-radius: 12px; border: 2px solid #ef4444; max-width: 500px; margin: 50px auto;">
        <h2 style="color: #b91c1c; margin-top: 0;">🛡️ 管理員即時監察端</h2>
        <p style="font-size: 1.1em; color: #4b5563;">目前連線：chloe-2c627</p>
        <hr style="border-color: #fca5a5;">
        <p style="font-size: 1.3em; font-weight: bold; color: #1f2937;">
            小朋友目前正在使用：<br>
            <span id="admin-display" style="font-size: 2em; color: #ef4444; block; margin-top: 10px;">載入中...</span>
        </p>
    </div>

</body>
</html>
